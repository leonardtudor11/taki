<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>taki 滝 — Cascade Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* warm-ink palette — deliberately not the cold blue-panel look */
    --ink:        #0d0e10;
    --ink-2:      #15171b;
    --paper:      #f1ede4;
    --paper-dim:  #b8b2a4;
    --rule:       #2a2620;
    --rule-soft:  #1c1a17;
    --shu:        #e84a3a;   /* vermilion ink-stamp accent */
    --gtm:        #5ad6e8;
    --finance:    #98e08a;
    --security:   #f0a849;
    --synergy:    #c8a8ff;
    --bad:        #ff7367;
    --ok:         #88e0a8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    font-feature-settings: "ss01", "cv11";
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 60% 40% at 12% -10%, rgba(90,214,232,0.06), transparent 70%),
      radial-gradient(ellipse 55% 35% at 88% 0%, rgba(240,168,73,0.05), transparent 70%);
  }

  /* ───────── header / brand ───────── */
  header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: end;
    gap: 28px;
    padding: 30px 40px 22px;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .brand { display: flex; align-items: flex-end; gap: 18px; }

  .logo { width: 56px; height: 72px; flex: none; display: block; color: var(--paper-dim); }
  .logo .cliff { stroke: currentColor; }
  .logo path {
    fill: none;
    stroke-linecap: round;
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    animation: draw 1.4s cubic-bezier(.4,.0,.2,1) forwards;
  }
  .logo path.s2 { animation-delay: .12s; }
  .logo path.s3 { animation-delay: .24s; }
  .logo circle { opacity: 0; animation: fade .35s ease-out forwards 1.35s; }
  .logo circle.s2 { animation-delay: 1.5s; }
  .logo circle.s3 { animation-delay: 1.65s; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fade { to { opacity: 1; } }

  .wordmark { line-height: 1; }
  .wordmark h1 {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 96, "SOFT" 40;
    font-weight: 500;
    font-size: 46px;
    letter-spacing: -0.025em;
    margin: 0 0 6px;
  }
  .wordmark .kanji {
    color: var(--shu);
    font-size: 28px;
    margin-left: 6px;
    vertical-align: 18px;
    font-weight: 400;
  }
  .wordmark .tagline {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px;
    color: var(--paper-dim);
    text-transform: lowercase;
    letter-spacing: 0.18em;
  }

  header .target {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    color: var(--paper);
    justify-self: end;
    align-self: end;
    text-align: right;
    max-width: 50ch;
  }
  header .meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--paper-dim);
  }
  .pullfresh {
    background: transparent;
    color: var(--shu);
    border: 1px solid var(--shu);
    border-radius: 0;
    padding: 7px 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .pullfresh:hover:not(:disabled) { background: rgba(232, 74, 58, 0.10); }
  .pullfresh:disabled { opacity: 0.55; cursor: wait; }

  /* ───────── main / stream lane ───────── */
  main {
    position: relative;
    max-width: 1280px;
    margin: 0 auto;
    padding: 36px 40px 80px;
    padding-left: 104px;
  }
  /* 3-stream spine: continues the logo metaphor down the page */
  main::before {
    content: "";
    position: absolute;
    left: 40px; top: 0; bottom: 0; width: 48px;
    pointer-events: none;
    opacity: 0.16;
    background:
      linear-gradient(to bottom, transparent 0, var(--gtm)      18px, var(--gtm)      82%, transparent 100%) 6px  0/1px 100% no-repeat,
      linear-gradient(to bottom, transparent 0, var(--finance)  18px, var(--finance)  72%, transparent 100%) 24px 0/1px 100% no-repeat,
      linear-gradient(to bottom, transparent 0, var(--security) 18px, var(--security) 62%, transparent 100%) 42px 0/1px 100% no-repeat;
  }

  /* ───────── executive summary ───────── */
  .exec {
    background: transparent;
    border: none;
    border-left: 2px solid var(--shu);
    padding: 4px 0 8px 22px;
    margin: 6px 0 36px;
    max-width: 760px;
    border-radius: 0;
  }
  .exec h2 {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    font-weight: 400;
    color: var(--paper-dim);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    margin: 0 0 10px;
  }
  .exec > div:not(.section-title) {
    font-family: "Fraunces", Georgia, serif;
    font-size: 22px;
    line-height: 1.42;
    font-weight: 400;
    color: var(--paper);
    letter-spacing: -0.005em;
  }

  /* ───────── badges (guardrail report) ───────── */
  .badges { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 38px; }
  .badge {
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 0;
    padding: 6px 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    color: var(--paper-dim);
    text-transform: lowercase;
    letter-spacing: 0.06em;
  }
  .badge b { color: var(--paper); font-weight: 500; }
  .badge.ok { border-color: var(--ok); color: var(--ok); }
  .badge.ok b { color: var(--ok); }

  /* ───────── section titles ───────── */
  .section-title {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.24em;
    color: var(--paper-dim);
    margin: 30px 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::before {
    content: "";
    width: 22px; height: 1px;
    background: var(--paper-dim);
  }

  /* ───────── synergies ───────── */
  .synergy-grid { display: grid; gap: 10px; margin-bottom: 32px; }
  .synergy {
    background: transparent;
    border: 1px solid var(--rule);
    border-left: 2px solid var(--synergy);
    border-radius: 0;
    padding: 12px 16px;
  }
  .synergy .depts {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--synergy);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }
  .synergy > div:last-child {
    font-family: "Fraunces", Georgia, serif;
    font-size: 16px;
    line-height: 1.45;
  }

  /* ───────── cascade flow — V3 cytoscape graph + text fallback ───────── */
  .flow { margin-bottom: 42px; }
  .cascade-toolbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    padding: 0 2px 8px;
    flex-wrap: wrap;
  }
  .cascade-replay,
  .cascade-livedemo,
  .cascade-liverun {
    background: transparent;
    border-radius: 0;
    padding: 5px 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  }
  .cascade-replay   { color: var(--shu);      border: 1px solid var(--shu); }
  .cascade-livedemo { color: var(--gtm);      border: 1px solid var(--gtm); }
  .cascade-liverun  { color: var(--finance);  border: 1px solid var(--finance); }
  .cascade-replay:hover:not(:disabled)   { background: rgba(232, 74, 58, 0.10); }
  .cascade-livedemo:hover:not(:disabled) { background: rgba(90, 214, 232, 0.10); }
  .cascade-liverun:hover:not(:disabled)  { background: rgba(152, 224, 138, 0.10); }
  .cascade-replay:disabled,
  .cascade-livedemo:disabled,
  .cascade-liverun:disabled {
    opacity: 0.45; cursor: wait;
    color: var(--paper-dim); border-color: var(--paper-dim);
  }
  /* dim slightly when the backend hasn't been detected; still clickable so
     the user sees the error tooltip when they try */
  .cascade-livedemo.backend-down,
  .cascade-liverun.backend-down {
    color: var(--paper-dim); border-color: var(--rule);
  }

  /* live-run popover */
  .cascade-liverun-wrap { position: relative; }
  .cascade-liveform {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    z-index: 12;
    width: 300px;
    background: var(--ink-2);
    border: 1px solid var(--finance);
    padding: 12px 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  .cascade-liveform[hidden] { display: none; }
  .cascade-livefield { display: flex; flex-direction: column; gap: 4px; }
  .cascade-livelabel {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--paper-dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .cascade-liveinput {
    background: var(--ink);
    border: 1px solid var(--rule);
    color: var(--paper);
    padding: 6px 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px;
    border-radius: 0;
    outline: none;
  }
  .cascade-liveinput:focus-visible {
    border-color: var(--finance);
  }
  .cascade-liveurls { resize: vertical; min-height: 60px; line-height: 1.4; }
  .cascade-liveactions {
    display: flex; justify-content: flex-end; gap: 6px; margin-top: 2px;
  }
  .cascade-liveclose,
  .cascade-livesubmit {
    background: transparent;
    border-radius: 0;
    padding: 5px 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    cursor: pointer;
  }
  .cascade-liveclose  { color: var(--paper-dim); border: 1px solid var(--rule); }
  .cascade-livesubmit { color: var(--finance);   border: 1px solid var(--finance); }
  .cascade-liveclose:hover  { color: var(--paper); border-color: var(--paper-dim); }
  .cascade-livesubmit:hover { background: rgba(152, 224, 138, 0.10); }
  /* during replay: dim everything else so the eye stays on the cascade */
  body.replaying .panel,
  body.replaying .synergy,
  body.replaying .exec,
  body.replaying .badges,
  body.replaying .dropped,
  body.replaying main > .section-title { opacity: 0.18; transition: opacity 0.3s ease; }
  body.replaying .cascade-graph { box-shadow: 0 0 0 1px var(--shu) inset; }
  .cascade-graph {
    width: 100%;
    height: 460px;
    background:
      radial-gradient(ellipse 60% 60% at 50% 50%, rgba(255,255,255,0.012), transparent 70%);
    border: 1px solid var(--rule);
    border-radius: 0;
    margin: 0 0 8px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.25s ease;
  }
  .cascade-graph--fallback { height: auto; padding: 8px 12px; border: 1px solid var(--rule); }
  .cascade-tip {
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    color: var(--paper-dim);
    letter-spacing: 0.04em;
    padding: 8px 4px 0;
    min-height: 2.2em;
    transition: color 0.2s ease;
    line-height: 1.5;
  }
  .cascade-tip[data-active] { color: var(--paper); }

  /* legacy text-fallback rows (used only when CDN unreachable) */
  .flow-nodes {
    display: flex;
    gap: 14px;
    margin-bottom: 6px;
    padding: 14px 0 16px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .node {
    flex: 1;
    text-align: center;
    padding: 11px 12px;
    border: 1px solid var(--rule);
    background: transparent;
    border-radius: 0;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }
  .node.gtm      { color: var(--gtm);      border-color: var(--gtm); }
  .node.finance  { color: var(--finance);  border-color: var(--finance); }
  .node.security { color: var(--security); border-color: var(--security); }
  .handoff {
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--rule);
    border-radius: 0;
    padding: 10px 0;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .hchip {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--rule);
    border-radius: 0;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .hchip.gtm      { color: var(--gtm);      border-color: var(--gtm); }
  .hchip.finance  { color: var(--finance);  border-color: var(--finance); }
  .hchip.security { color: var(--security); border-color: var(--security); }
  .harrow { color: var(--paper-dim); }
  .hmsg {
    color: var(--paper);
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-size: 15px;
  }

  /* ───────── focus filter — dim non-focused panels/synergies ───────── */
  .panel, .synergy { transition: opacity 0.32s ease, filter 0.32s ease; }
  body[data-focus="gtm"]      .panel:not(.gtm),
  body[data-focus="finance"]  .panel:not(.finance),
  body[data-focus="security"] .panel:not(.security) {
    opacity: 0.22; filter: saturate(0.4);
  }
  body[data-focus="gtm"]      .synergy:not(.has-gtm),
  body[data-focus="finance"]  .synergy:not(.has-finance),
  body[data-focus="security"] .synergy:not(.has-security) {
    opacity: 0.22; filter: saturate(0.4);
  }

  /* ───────── departments ───────── */
  .cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
  .panel {
    background: transparent;
    border: none;
    border-top: 2px solid var(--rule);
    border-radius: 0;
    padding: 0;
    overflow: visible;
  }
  .panel.gtm      { border-top-color: var(--gtm); }
  .panel.finance  { border-top-color: var(--finance); }
  .panel.security { border-top-color: var(--security); }
  .panel h3 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 500;
    margin: 0;
    padding: 14px 0 18px;
    font-size: 20px;
    letter-spacing: -0.005em;
    border: none;
  }
  .panel.gtm h3      { color: var(--gtm); }
  .panel.finance h3  { color: var(--finance); }
  .panel.security h3 { color: var(--security); }

  .group { padding: 4px 0 18px; }
  .group h4 {
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--paper-dim);
    margin: 0 0 10px;
  }

  .claim {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--rule-soft);
    border-radius: 0;
    padding: 10px 0 12px;
    margin-bottom: 0;
    font-size: 14px;
    line-height: 1.5;
    color: var(--paper);
  }
  .claim:last-child { border-bottom: none; }
  /* V4 confidence bar — hairline at the top of each claim, dept-coloured */
  .claim-bar {
    height: 2px;
    background: var(--rule);
    margin: 0 0 10px;
    position: relative;
    overflow: hidden;
  }
  .claim-bar-fill {
    height: 100%;
    background: var(--paper-dim);
    width: 0;
    transition: width 0.6s cubic-bezier(.4,.0,.2,1) 0.1s;
  }
  .panel.gtm      .claim-bar-fill { background: var(--gtm); }
  .panel.finance  .claim-bar-fill { background: var(--finance); }
  .panel.security .claim-bar-fill { background: var(--security); }

  .claim .cites { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .cite {
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px;
    color: var(--paper-dim);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: 0;
    padding: 2px 7px;
    text-transform: lowercase;
    letter-spacing: 0.06em;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .cite:hover { color: var(--shu); border-color: var(--shu); }

  /* V4 dropped-claims drawer — proof that the grounding guard caught hallucinations */
  .dropped {
    border: 1px solid var(--bad);
    background: linear-gradient(180deg, rgba(255,115,103,0.05), rgba(255,115,103,0.02));
    padding: 0;
    margin: -10px 0 32px;
    max-width: 920px;
  }
  .dropped-summary {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--bad);
    text-transform: lowercase;
    letter-spacing: 0.07em;
    padding: 10px 14px;
    cursor: pointer;
    list-style: none;
    user-select: none;
  }
  .dropped-summary::-webkit-details-marker { display: none; }
  .dropped-summary::before {
    content: "▸";
    display: inline-block;
    margin-right: 8px;
    transition: transform 0.18s ease;
  }
  .dropped[open] .dropped-summary::before { transform: rotate(90deg); }
  .dropped-list {
    padding: 4px 28px 14px;
    margin: 0;
    font-size: 13px;
    color: var(--paper-dim);
    line-height: 1.55;
    counter-reset: dropped;
  }
  .dropped-list li {
    padding: 8px 0;
    border-top: 1px dashed var(--rule);
    position: relative;
  }
  .dropped-list li:first-child { border-top: none; }
  .dropped-list li::marker { color: var(--bad); font-family: "JetBrains Mono", monospace; font-size: 11px; }

  /* V4 keyboard focus rings */
  a:focus-visible, button:focus-visible, summary:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--shu);
    outline-offset: 2px;
  }
  .empty {
    color: var(--paper-dim);
    font-size: 13px;
    font-style: italic;
    padding: 8px 0;
  }

  #error {
    color: var(--bad);
    padding: 20px 0;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
  }
  .hidden { display: none; }

  /* ───────── responsive ───────── */
  @media (max-width: 960px) {
    main { padding: 28px 24px 60px; }
    main::before { display: none; }
    .cols { grid-template-columns: 1fr; gap: 32px; }
    header {
      grid-template-columns: 1fr;
      padding: 22px 24px 18px;
    }
    header .target { justify-self: start; text-align: left; }
    header .meta { align-items: flex-start; }
    .wordmark h1 { font-size: 38px; }
    .exec > div:not(.section-title) { font-size: 18px; }
  }
  @media (max-width: 600px) {
    .cascade-graph { height: 320px; }
    .cascade-replay { font-size: 9.5px; padding: 4px 9px; letter-spacing: 0.12em; }
    .dropped-list { padding-left: 22px; padding-right: 14px; }
    .badges { gap: 8px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo path, .logo circle { animation: none; stroke-dashoffset: 0; opacity: 1; }
    .claim-bar-fill { transition: none; }
    * { transition-duration: 0.001s !important; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg class="logo" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg" aria-label="Taki — three cascading streams" role="img">
      <line class="cliff" x1="2" y1="6" x2="62" y2="6" stroke-width="1" opacity="0.35"/>
      <path class="s1" d="M 12 6 Q 6 36 16 72" stroke="#5ad6e8" stroke-width="2"/>
      <circle class="s1" cx="16" cy="74" r="2" fill="#5ad6e8"/>
      <path class="s2" d="M 32 6 Q 36 38 28 76" stroke="#98e08a" stroke-width="2"/>
      <circle class="s2" cx="28" cy="78" r="2" fill="#98e08a"/>
      <path class="s3" d="M 52 6 Q 48 40 56 70" stroke="#f0a849" stroke-width="2"/>
      <circle class="s3" cx="56" cy="72" r="2" fill="#f0a849"/>
    </svg>
    <div class="wordmark">
      <h1>taki<span class="kanji">滝</span></h1>
      <div class="tagline">cascading intelligence</div>
    </div>
  </div>
  <span class="target" id="target">…</span>
  <div class="meta">
    <span class="ts" id="ts"></span>
    <button class="pullfresh" id="pullfresh" title="Run the cascade live against the bundled fixture (no keys required)">▶ live demo</button>
  </div>
</header>
<main id="app">
  <div id="error" class="hidden"></div>
</main>
<!-- cytoscape: interactive cascade graph · GSAP: scripted entry timing.
     Loaded synchronously before our scripts so renderCascadeFlow can use them. -->
<script src="https://unpkg.com/cytoscape@3.30.0/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="cascade-flow.js"></script>
<script src="app.js"></script>
</body>
</html>
