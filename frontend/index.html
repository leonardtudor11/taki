<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taki 滝 — Cascade Brief</title>
<style>
  :root {
    --bg: #0b0f17; --panel: #131a26; --panel2: #1a2433; --line: #233045;
    --text: #e6edf6; --muted: #8aa0bd; --accent: #4cc9f0;
    --gtm: #4cc9f0; --finance: #80ffb0; --security: #ffb454; --synergy: #c792ea;
    --bad: #ff6b6b; --ok: #57d9a3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  header {
    padding: 24px 28px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 26px; letter-spacing: .5px; }
  header .kanji { color: var(--accent); }
  header .target { font-size: 18px; color: var(--muted); }
  header .ts { margin-left: auto; font-size: 12px; color: var(--muted); }
  main { padding: 22px 28px; max-width: 1280px; margin: 0 auto; }
  .exec {
    background: linear-gradient(90deg, var(--panel2), var(--panel));
    border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 10px; padding: 16px 18px; margin-bottom: 18px;
  }
  .exec h2 { margin: 0 0 6px; font-size: 13px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); }
  .badges { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
  .badge {
    background: var(--panel); border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 14px; font-size: 13px; color: var(--muted);
  }
  .badge b { color: var(--text); }
  .badge.ok { border-color: var(--ok); }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 8px 0 12px; }
  .synergy-grid { display: grid; gap: 12px; margin-bottom: 26px; }
  .synergy {
    background: var(--panel); border: 1px solid var(--line);
    border-left: 3px solid var(--synergy); border-radius: 10px; padding: 14px 16px;
  }
  .synergy .depts { font-size: 12px; color: var(--synergy); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: .5px; }
  .cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 0 0 8px; overflow: hidden; }
  .panel h3 { margin: 0; padding: 14px 16px; font-size: 15px;
    border-bottom: 1px solid var(--line); }
  .panel.gtm h3 { color: var(--gtm); }
  .panel.finance h3 { color: var(--finance); }
  .panel.security h3 { color: var(--security); }
  .group { padding: 12px 16px 4px; }
  .group h4 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .5px; color: var(--muted); }
  .claim { background: var(--panel2); border: 1px solid var(--line);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 14px; }
  .claim .cites { margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
  .cite { font-size: 11px; color: var(--accent); text-decoration: none;
    border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; }
  .cite:hover { background: var(--panel); }
  .conf { float: right; font-size: 11px; color: var(--muted); }
  .empty { color: var(--muted); font-size: 13px; padding: 0 16px 10px; font-style: italic; }
  .pullfresh {
    background: var(--accent); color: #002235; border: none; border-radius: 8px;
    padding: 9px 16px; font-weight: 600; cursor: not-allowed; opacity: .55;
  }
  #error { color: var(--bad); padding: 20px; }
  .flow { margin-bottom: 26px; }
  .flow-nodes { display: flex; gap: 12px; margin-bottom: 14px; }
  .node { flex: 1; text-align: center; padding: 12px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--panel); font-weight: 600; }
  .node.gtm { color: var(--gtm); border-color: var(--gtm); }
  .node.finance { color: var(--finance); border-color: var(--finance); }
  .node.security { color: var(--security); border-color: var(--security); }
  .handoff { display: flex; align-items: center; gap: 10px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px;
    margin-bottom: 8px; font-size: 13px; flex-wrap: wrap; }
  .hchip { font-size: 11px; padding: 2px 8px; border-radius: 6px;
    border: 1px solid var(--line); text-transform: uppercase; letter-spacing: .5px; }
  .hchip.gtm { color: var(--gtm); } .hchip.finance { color: var(--finance); }
  .hchip.security { color: var(--security); }
  .harrow { color: var(--muted); }
  .hmsg { color: var(--text); }
  @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>Taki <span class="kanji">滝</span></h1>
  <span class="target" id="target">…</span>
  <button class="pullfresh" id="pullfresh" title="Live mode needs Bright Data keys">⚡ Pull Fresh</button>
  <span class="ts" id="ts"></span>
</header>
<main id="app">
  <div id="error" class="hidden"></div>
</main>
<script src="cascade-flow.js"></script>
<script src="app.js"></script>
</body>
</html>
