  <rect width="64" height="64" rx="13" fill="#0d0e10"/>
  <!-- three vermillion strokes — waterfall (滝) abstraction -->
  <g stroke="#e84a3a" stroke-width="4.2" stroke-linecap="round" fill="none">
    <line x1="20" y1="14" x2="20" y2="46"/>
    <line x1="32" y1="12" x2="32" y2="50"/>
    <line x1="44" y1="14" x2="44" y2="44"/>
  </g>
  <!-- cascade droplets — brand cyan/finance-green/marketing-magenta -->
  <circle cx="20" cy="52" r="2.6" fill="#5ad6e8"/>
  <circle cx="32" cy="55" r="2.6" fill="#98e08a"/>
  <circle cx="44" cy="50" r="2.6" fill="#ff85c9"/>
</svg>
